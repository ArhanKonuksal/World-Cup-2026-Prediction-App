<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="World Cup 2026 Predictor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#d4b05a"/>
      <stop offset="1" stop-color="#b8952f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="56" y="56" width="1088" height="518" stroke="#b8952f" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Bracket motif — far right only, never crosses text column -->
  <g stroke="#b8952f" stroke-opacity="0.2" stroke-width="2" fill="none" transform="translate(0, 0)">
    <path d="M940 200 H990 V240 H1040"/>
    <path d="M940 430 H990 V390 H1040"/>
    <path d="M1040 240 V390"/>
    <path d="M1040 315 H1100"/>
    <path d="M1060 200 H1090 V175 H1120"/>
    <path d="M1060 430 H1090 V455 H1120"/>
    <path d="M1120 175 V455"/>
    <path d="M1120 315 H1140"/>
  </g>

  <!-- 26 mark -->
  <rect x="88" y="210" width="108" height="108" stroke="url(#gold)" stroke-width="2" fill="rgba(184,149,47,0.08)"/>
  <rect x="88" y="210" width="108" height="7" fill="#b8952f"/>
  <text
    x="142"
    y="288"
    text-anchor="middle"
    fill="url(#gold)"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50"
    font-weight="600"
  >26</text>

  <!-- Text block — clipped to left column so nothing overlaps bracket art -->
  <g>
    <text
      x="220"
      y="238"
      fill="rgba(250,250,250,0.45)"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="20"
      font-weight="600"
      letter-spacing="0.16em"
    >FIFA WORLD CUP 2026</text>

    <text
      x="220"
      y="300"
      fill="#fafafa"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="52"
      font-weight="500"
    >World Cup 2026 Predictor</text>

    <text
      x="220"
      y="358"
      fill="rgba(250,250,250,0.7)"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="26"
      font-weight="400"
    >Predict groups, pick 8 third-place teams,</text>
    <text
      x="220"
      y="392"
      fill="rgba(250,250,250,0.7)"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="26"
      font-weight="400"
    >build your knockout bracket.</text>

    <text
      x="220"
      y="448"
      fill="rgba(250,250,250,0.4)"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="18"
