      letter-spacing="0.1em"
    >48 TEAMS · 104 MATCHES · USA · MEXICO · CANADA</text>

    <rect x="220" y="472" width="96" height="2" fill="#b8952f"/>

    <text
      x="220"
      y="508"
      fill="#c9925a"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="18"
      font-weight="500"
    >worldcup2026.arhan-konuksal.dev</text>
  </g>
